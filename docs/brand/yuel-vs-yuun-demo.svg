<svg width="1120" height="640" viewBox="0 0 560 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="moon" x1="70" y1="70" x2="230" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0.18" stop-color="#0B0B0C"/>
      <stop offset="0.5" stop-color="#3A3B40"/>
      <stop offset="1" stop-color="#D7D8DC"/>
    </linearGradient>
    <linearGradient id="cinnabar2" x1="420" y1="92" x2="420" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C0392B"/>
      <stop offset="1" stop-color="#8E1F22"/>
    </linearGradient>
    <radialGradient id="vignette2" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#1A1512"/>
