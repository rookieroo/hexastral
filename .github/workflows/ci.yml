name: CI

# CI runs validation only — typecheck, lint, test, and dependency consistency.
# Production deploys are performed locally via wrangler / EAS by maintainers.
# See deploy.md for the local deploy runbook.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun typecheck
      - name: Lint
        run: bun lint
      - name: Test
        run: bun test
      - name: Check dependency consistency
        run: bun check-deps
      - name: Yuun ASO char limits
        run: bun run aso:charcount
      - name: Yuun ASO code parity
        run: bun run aso:parity
